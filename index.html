        :root {
            --neo-green: #124d33;
            --neo-dark: #0a2e1e;
            --neo-gold: #d4af37; 
            --neo-beige: #fdfbf7;
            --muted: #6b6b6b;
            --shadow: 0 18px 40px rgba(18,77,51,0.06);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }
        
        body {

            font-family: "Cairo", sans-serif;
            color: #0b0b0b;

            -webkit-tap-highlight-color: transparent;
        }

        /* ===== زينة رمضان ===== */
        .lantern-container { position: absolute; top: 0; left: 0; width: 100%; height: 120px; overflow: hidden; z-index: 1; pointer-events: none; }
        .lantern { position: absolute; width: 28px; height: 38px; background: var(--neo-gold); border-radius: 6px; box-shadow: 0 0 18px var(--neo-gold); animation: swing 3s infinite ease-in-out alternate, pulseGlow 2s infinite alternate; transform-origin: top center; z-index: 1; border: 1px solid rgba(255,255,255,0.4);}
        .lantern::before { content:''; position:absolute; top:-120px; left:13px; width:2px; height:120px; background: rgba(255,255,255,0.3); }
        .l1 { left: 8%; top: 10px; animation-duration: 3.2s; }
        .l2 { left: 28%; top: -15px; animation-duration: 2.7s; transform: scale(0.85); background: var(--neo-green); box-shadow: 0 0 15px var(--neo-green); border-color: var(--neo-gold);}
        .l3 { left: 50%; top: 5px; animation-duration: 3.5s; }
        .l4 { left: 72%; top: -10px; animation-duration: 2.9s; transform: scale(0.9); }
        .l5 { left: 90%; top: 15px; animation-duration: 3.1s; transform: scale(0.8); background: var(--neo-green); box-shadow: 0 0 15px var(--neo-green); border-color: var(--neo-gold);}

        @keyframes swing { 0% { transform: rotate(8deg); } 100% { transform: rotate(-8deg); } }
        @keyframes pulseGlow { 0% { opacity: 0.8; } 100% { opacity: 1; box-shadow: 0 0 25px var(--neo-gold); } }

        /* ===== رأس الصفحة ===== */
        .header {
            background: linear-gradient(180deg, var(--neo-dark), var(--neo-green));
            padding: 25px 14px 20px;
            text-align: center;
            color: #fff;
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            position: relative;
            box-shadow: 0 10px 20px rgba(18,77,51,0.2);
        }
        .header h1 { color:var(--neo-gold); font-weight:900; font-size:24px; text-shadow: 0 2px 4px rgba(0,0,0,0.3); position: relative; z-index: 2; margin-bottom: 5px;}
        .ramadan-slogan { background: rgba(212, 175, 55, 0.2); color: var(--neo-gold); display: inline-block; padding: 4px 15px; border-radius: 20px; font-size: 13px; font-weight: 700; border: 1px solid var(--neo-gold); position: relative; z-index: 2;}

        .logo-container {
            position: relative; margin: 0 auto 10px; width: 80px; height: 80px;
            display: flex; align-items: center; justify-content: center; z-index: 10;
        }
        .logo-container::before {
            content: ''; position: absolute; inset: -4px; border-radius: 50%;
            border: 2px solid transparent; border-top-color: var(--neo-gold); border-right-color: var(--neo-gold);
            transform: rotate(-45deg); animation: rotateRing 3s linear infinite;
        }
        @keyframes rotateRing { 100% { transform: rotate(315deg); } }
        .logo { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; background: #fff; padding: 3px; position: relative; z-index: 2; box-shadow: 0 5px 15px rgba(0,0,0,0.3);}

        /* ===== الأقسام (موزعة على سطرين بشكل متناسق) ===== */
        .cats-grid {
            padding: 20px 10px 10px;
        }
        .cats-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            width: 100%;
        }
        .cat {
            flex: 1 1 calc(20% - 10px);
            min-width: 85px;
            padding: 10px 5px;
            background: var(--white);
            border: 2px solid var(--neo-gold);
            border-radius: 12px;
            cursor: pointer;
            font-weight: 800;
            font-size: 13px;
            color: var(--neo-green);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .cat.active {
            background: linear-gradient(45deg,var(--neo-green),var(--neo-dark));
            color: var(--neo-gold);
            border-color: var(--neo-dark);
            box-shadow: 0 10px 20px rgba(18,77,51,0.2);
            transform: translateY(-2px);
        }

        /* ===== الأقسام الفرعية ===== */
        .subcats-nav { display:flex; gap:8px; overflow-x:auto; padding-bottom:10px; margin-bottom:15px; }
        .subcats-nav::-webkit-scrollbar { height: 4px; }
        .subcats-nav::-webkit-scrollbar-thumb { background: var(--neo-gold); border-radius: 4px; }
        .subcat-btn { background:#fff; border:1px solid var(--neo-gold); color:var(--neo-green); padding:8px 16px; border-radius:20px; font-weight:800; font-family:inherit; cursor:pointer; white-space:nowrap; transition:0.2s; font-size: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.03);}
        .subcat-btn.active { background:var(--neo-green); color:var(--neo-gold); border-color:var(--neo-dark); }

        /* ===== الكروت والمنتجات ===== */
        .container { max-width: 1000px; margin: auto; padding: 10px 15px 150px; min-height: 50vh; }
        .section-container { display: none; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .section-title { color: var(--neo-green); font-weight: 900; font-size: 22px; margin: 15px 0 20px; text-align: right; display: flex; align-items: center; gap: 8px; }
        .section-title::before { content: '🌙'; font-size: 18px; }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .card { background: #fff; border-radius: 15px; padding: 10px; box-shadow: var(--shadow); border: 1px solid rgba(212,175,55,0.2); display: flex; flex-direction: column; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); border-color: var(--neo-gold); }
        .card img { width: 100%; height: 140px; object-fit: cover; border-radius: 12px; margin-bottom: 10px; background: #f9f9f9; border: 1px solid #eee; }
        .card-name { font-weight: 800; font-size: 14px; color: var(--neo-dark); line-height: 1.3; flex-grow: 1; }
        .card-price { color: var(--neo-green); font-weight: 900; font-size: 15px; margin: 8px 0; }
        .add-btn { background: var(--neo-green); color: var(--neo-gold); border: none; padding: 10px; border-radius: 10px; font-weight: 800; cursor: pointer; width: 100%; font-size: 13px; box-shadow: 0 5px 15px rgba(18,77,51,0.1); }

        /* ===== السلة والمودال ===== */
        .cart-float { position: fixed; right: 15px; bottom: 15px; z-index: 1000; }
        .cart-trigger { background: var(--neo-green); color: var(--neo-gold); padding: 15px 20px; border-radius: 20px; display: flex; align-items: center; gap: 12px; box-shadow: 0 15px 40px rgba(18,77,51,0.3); border: 2px solid var(--neo-gold); cursor: pointer; font-size: 16px; }
        .cart-count { background: var(--neo-gold); color: #000; padding: 4px 12px; border-radius: 999px; font-weight: 900; }
        
        .modal-back { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; z-index: 2000; align-items: center; justify-content: center; padding: 15px; backdrop-filter: blur(5px); }
        .modal { background: #fff; width: 100%; max-width: 500px; border-radius: 20px; padding: 20px; max-height: 85vh; overflow-y: auto; direction: rtl; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
        
        .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--neo-dark); color: var(--neo-gold); padding: 12px 25px; border-radius: 50px; font-weight: 800; opacity: 0; transition: 0.3s; z-index: 3000; pointer-events: none; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        .loader-container { text-align: center; padding: 50px 20px; color: var(--neo-green); font-weight: bold; }
        .loader-spinner { font-size: 40px; color: var(--neo-gold); animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        input.checkout-input, select.checkout-input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 10px; font-family: 'Cairo'; font-size: 14px; font-weight: bold;}

        /* ===== الفوتر ===== */
        footer { padding: 25px 15px; text-align: center; color: #fff; background: var(--neo-dark); border-top-left-radius: 25px; border-top-right-radius: 25px; margin-top: 30px; box-shadow: 0 -10px 20px rgba(0,0,0,0.1); }
        .footer-socials { display: flex; gap: 15px; justify-content: center; margin-bottom: 15px; }
        .footer-socials a { padding: 10px 20px; border-radius: 12px; color: var(--neo-dark); background: var(--neo-gold); font-weight: 900; text-decoration: none; transition: 0.2s; }
        .footer-socials a:hover { transform: scale(1.05); }

        @media (max-width: 480px) {
            .cat { font-size: 11px; padding: 8px 3px; min-width: 70px; }
            .card { padding: 8px; }
            .card img { height: 110px; margin-bottom: 8px; }
            .card-name { font-size: 12px; }
            .card-price { font-size: 14px; margin: 5px 0; }
            .add-btn { font-size: 12px; padding: 8px; }
        }
    </style>
</head>

    <div class="cats-grid" id="catsNavContainer" style="display:none;"></div>

    <main class="container" id="menuContent">

            <p>جاري سحب الأسعار المحدثة من الكاشير...</p>
        </div>
    </main>

    <div class="cart-float">
        <div class="cart-trigger" onclick="openCart()">
            <div class="cart-count" id="cartCount">0</div>
            <div style="font-weight: 900;">السلة</div>
        </div>
    </div>

    <div id="cartModal" class="modal-back">
        <div class="modal">
            <h2 style="color:var(--neo-green); margin-bottom:15px; font-weight:900;">طلباتك المتميزة 🌙</h2>
            <div id="cartList"></div>
            <div id="finalTotal" style="text-align:center; font-weight:900; font-size:20px; margin:20px 0; color:var(--neo-dark);"></div>
            
            <div id="checkoutForm" style="display:none; background:#f9f9f9; padding:15px; border-radius:15px; border:1px solid #eee; margin-bottom:15px;">
                <h4 style="margin-bottom:10px; color:var(--neo-green);">مكانك فين يا رايق ؟</h4>
                <select id="orderTable" class="checkout-input">
                    <option value="">-- اختر رقم الترابيزة أو تيك أواي --</option>
                    <option value="takeaway">تيك أواي (هاخده وأمشي) 🛍️</option>
                    <option value="1">ترابيزة 1</option>
                    <option value="2">ترابيزة 2</option>
                    <option value="3">ترابيزة 3</option>
                    <option value="4">ترابيزة 4</option>
                    <option value="5">ترابيزة 5</option>
                    <option value="6">ترابيزة 6</option>
                    <option value="7">ترابيزة 7</option>
                    <option value="8">ترابيزة 8</option>
                    <option value="12">البار الكبير</option>
                    <option value="11">البار الصغير</option>
                    <option value="13">الشارع (يمين)</option>
                    <option value="14">الشارع (شمال)</option>
                </select>
                
                <input type="text" id="orderName" class="checkout-input" placeholder="اسمك (لإضافة النقاط)..." style="margin-bottom:10px;">
                <input type="tel" id="orderPhone" class="checkout-input" placeholder="رقم الموبايل (ضروري لنقاط الولاء)..." style="margin-bottom:0;" maxlength="11">
            </div>

            <div style="display:flex; gap:10px">
                <button onclick="closeCart()" style="flex:1; padding:12px; border-radius:12px; border:none; background: #eee; color:#333; font-weight:800; cursor:pointer;">إغلاق</button>
                <button onclick="sendOrderLive()" style="flex:2; padding:12px; border-radius:12px; background:var(--neo-green); color:var(--neo-gold); font-weight:900; border:none; cursor:pointer;">إرسال الطلب للكاشير 🚀</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">تم الإضافة للسلة بنجاح</div>

    <footer>
        <div style="font-weight:900; margin-bottom:12px; color:var(--neo-gold); font-size:18px;">تابعنا في رمضان</div>
        <div class="footer-socials">
            <a href="https://facebook.com/neo.cafe.eg" target="_blank">Facebook</a>
            <a href="https://instagram.com/neocafe.eg" target="_blank">Instagram</a>
        </div>
        <div style="font-weight:700; font-size:14px; opacity:0.9;">❤️ شكراً لاختياركم نيو كافية</div>
    </footer>

    storageBucket: "neo-cafe-c37a2.firebasestorage.app",
    messagingSenderId: "371149733500",
    appId: "1:371149733500:web:ea9ba15401c9aa9a6893f9"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();

let MENU_DATA = {};
const CART_KEY = 'neo_cafe_cart_live';

// الترتيب المطلوب للأقسام
const CATEGORY_ORDER = ['ramadan', 'hot', 'cold', 'soft', 'dessert', 'ice', 'special', 'extras', 'fun'];

// --- استدعاء البيانات لايف من السيستم (Smart Merge) ---
database.ref('NeoCafe/live_menu').on('value', (snapshot) => {
    if(snapshot.exists()) {
        MENU_DATA = snapshot.val();
        renderDynamicNav();
        renderEntireMenu();
    } else {
        document.getElementById('menuContent').innerHTML = '<div class="loader-container"><p style="color:red;">المنيو يتم تحديثه الآن، برجاء الانتظار...</p></div>';
    }
});

function renderDynamicNav() {
    const navContainer = document.getElementById('catsNavContainer');
    let html = '<div class="cats-row">';
    
    const availableCats = CATEGORY_ORDER.filter(k => MENU_DATA[k]);
    
    availableCats.forEach((key, index) => {
        let activeClass = index === 0 ? 'active' : '';
        let title = MENU_DATA[key].title;
        if(key === 'ramadan' && !title.includes('موسمي')) title += ' (موسمي)';
        
        html += `<div class="cat ${activeClass}" data-cat="${key}">${title}</div>`;
    });
    
    html += '</div>';
    navContainer.innerHTML = html;
    navContainer.style.display = 'block';

    document.querySelectorAll('.cat').forEach(tab => {
        tab.onclick = () => {
            document.querySelectorAll('.cat').forEach(c => c.classList.remove('active'));
            tab.classList.add('active');
            const cat = tab.dataset.cat;
            document.querySelectorAll('.section-container').forEach(s => s.style.display = 'none');
            const targetSec = document.getElementById('sec_' + cat);
            if(targetSec) targetSec.style.display = 'block';
        };
    });
}

function createGridHTML(items) {
    const grid = document.createElement('div');
    grid.className = 'grid';
    items.forEach(item => {
        const imgSrc = IMAGE_DICTIONARY[item.name] || 'assets/images/logo.png';
        grid.innerHTML += `
            <div class="card">
                <img src="${imgSrc}" onerror="this.src='assets/images/logo.png'">
                <div class="card-name">${item.name}</div>
                <div class="card-price">${item.price === 0 ? 'مجانًا' : item.price + ' ج'}</div>
                <button class="add-btn" onclick="addToCart('${item.id}', '${escapeHtml(item.name)}', ${item.price})">أضف للسلة</button>
            </div>
        `;
    });
    return grid;
}

function escapeHtml(s){return String(s||'').replace(/&/g,"&amp;").replace(/</g,"&lt;");}

function renderEntireMenu() {
    const content = document.getElementById('menuContent');
    content.innerHTML = ''; 
    
    const availableCats = CATEGORY_ORDER.filter(k => MENU_DATA[k]);
    
    availableCats.forEach(key => {
        const sec = document.createElement('div');
        sec.className = 'section-container';
        sec.id = 'sec_' + key;
        
        let title = MENU_DATA[key].title;
        if(key === 'ramadan' && !title.includes('موسمي')) title += ' (موسمي)';
        sec.innerHTML = `<h2 class="section-title">${title}</h2>`;
        
        if (MENU_DATA[key].isComplex && MENU_DATA[key].subcats) {
            const subNav = document.createElement('div');
            subNav.className = 'subcats-nav';
            const gridContainer = document.createElement('div');
            gridContainer.className = 'subcat-grid-container';

            MENU_DATA[key].subcats.forEach((sub, index) => {
                const btn = document.createElement('button');
                btn.className = 'subcat-btn' + (index === 0 ? ' active' : '');
                btn.textContent = sub.title;
                btn.onclick = (e) => {
                    subNav.querySelectorAll('.subcat-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    gridContainer.innerHTML = '';
                    gridContainer.appendChild(createGridHTML(sub.items));
                };
                subNav.appendChild(btn);
            });

            if(MENU_DATA[key].subcats.length > 0) {
                gridContainer.appendChild(createGridHTML(MENU_DATA[key].subcats[0].items));
            }
            sec.appendChild(subNav);
            sec.appendChild(gridContainer);
        } 
        else if (MENU_DATA[key].items) {
            sec.appendChild(createGridHTML(MENU_DATA[key].items));
        }
        
        content.appendChild(sec);
    });

    const activeTabEl = document.querySelector('.cat.active');
    const activeCat = activeTabEl ? activeTabEl.dataset.cat : availableCats[0];
    
    document.querySelectorAll('.section-container').forEach(s => {
        s.style.display = s.id === 'sec_' + activeCat ? 'block' : 'none';
    });
}

// --- دوال السلة ---
function getCart() { return JSON.parse(localStorage.getItem(CART_KEY)) || []; }
function setCart(cart) { localStorage.setItem(CART_KEY, JSON.stringify(cart)); updateCartUI(); }

function addToCart(id, name, price) {
    let cart = getCart();
    const existing = cart.find(i => i.name === name);
    if (existing) { existing.qty += 1; } else { cart.push({ id, name, price, qty: 1 }); }
    setCart(cart); showToast(name);
}

function removeItem(name) {
    let cart = getCart().filter(i => i.name !== name); setCart(cart); openCart(); 
}

function updateCartUI() {
    const cart = getCart();
    const count = cart.reduce((sum, item) => sum + item.qty, 0);
    document.getElementById('cartCount').textContent = count;
}

function openCart() {
    const cart = getCart();
    const list = document.getElementById('cartList');
    const totalEl = document.getElementById('finalTotal');
    const checkoutForm = document.getElementById('checkoutForm');
    
    if (cart.length === 0) {
        list.innerHTML = '<p style="text-align:center; font-weight:700; padding:20px;">السلة فارغة حالياً</p>';
        totalEl.textContent = "";
        checkoutForm.style.display = 'none';
    } else {
        list.innerHTML = cart.map(item => `
            <div class="cart-item">
                <div>
                    <b style="color:var(--neo-dark); font-size:15px">${item.name}</b><br>
                    <small style="color:var(--muted); font-weight:800">${item.price} ج × ${item.qty}</small>
                </div>
                <button onclick="removeItem('${item.name}')" style="color:#d93025; background:none; border:none; font-weight:900; cursor:pointer; font-size:15px;">حذف</button>
            </div>
        `).join('');
        
        const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
        totalEl.textContent = `الإجمالي: ${total} جنيه`;
        checkoutForm.style.display = 'block';
    }
    document.getElementById('cartModal').style.display = 'flex';
}

function closeCart() { document.getElementById('cartModal').style.display = 'none'; }

function showToast(name) {
    const t = document.getElementById('toast');
    t.textContent = `تم إضافة ${name} للسلة`; t.style.opacity = 1; t.style.transform = "translate(-50%, -10px)";
    const cb = document.querySelector('.cart-trigger'); cb.style.transform = 'scale(1.1)'; 
    setTimeout(() => cb.style.transform = 'scale(1)', 200);
    setTimeout(() => { t.style.opacity = 0; t.style.transform = "translateX(-50%)"; }, 2000);
}

// --- إرسال الأوردر لايف للسيستم ---
function sendOrderLive() {
    const cart = getCart();
    if (cart.length === 0) return;
    
    const table = document.getElementById('orderTable').value;
    const cName = document.getElementById('orderName').value;
    const cPhone = document.getElementById('orderPhone').value;
    
    if(!table) return alert('برجاء اختيار رقم الترابيزة لكي نتمكن من توصيل طلبك!');
    if(!cPhone) return alert('برجاء كتابة رقم الموبايل عشان نقدر نضيفلك نقاط الولاء يا رايق!');

    const orderData = {
        table: table, 
        customerName: cName,
        customerPhone: cPhone,
        items: cart,
        time: Date.now()
    };

    database.ref('NeoCafe/online_orders').push(orderData).then(() => {
        alert('تم إرسال طلبك بنجاح! يتم تجهيزه الآن ☕🚀');
        setCart([]); 
        closeCart();
    }).catch((error) => {
        alert('حدث خطأ أثناء إرسال الطلب، تأكد من اتصالك بالانترنت.');
    });
}

updateCartUI();
